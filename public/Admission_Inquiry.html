<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Enquiry | Gurukul Classes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="logo-img">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                    <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                </svg>
                <div class="logo-text">
                    <h1>Gurukul Classes</h1>
                    <p>Excellence in Education</p>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="About_Us.html">About Us</a></li>
                    <li><a href="Admission_Inquiry.html" class="active">Admissions</a></li>
                    <li><a href="Student_Login.html" class="btn-outline">Login</a></li>
                    <li><a href="Register.html" class="btn-primary">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 3rem 1.5rem 1rem; background: var(--background);">
            <div class="hero-content">
                <h2>Admission Enquiry</h2>
                <p>Do not hesitate to reach out. Drop your details and we will get back to you as fast as possible.</p>
            </div>
        </section>

        <div class="container" style="padding-top: 2rem;">
            <div class="form-container">
                <!-- Note: We keep the form action and methodology identical to sync with server.js -->
                <form action="/api/inquiry" method="POST" id="enquiry-form">
                    <div class="form-group">
                        <label class="form-label" for="first-name">First Name</label>
                        <input type="text" class="form-control" id="first-name" name="first-name" placeholder="John"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="last-name">Last Name</label>
                        <input type="text" class="form-control" id="last-name" name="last-name" placeholder="Doe"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email"
                            placeholder="john.doe@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="class">Applying for Class</label>
                        <input type="number" class="form-control" id="class" name="class" placeholder="10" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="message">Your Message</label>
                        <textarea class="form-control" id="message" name="message"
                            placeholder="Optional notes..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary form-submit">Submit Enquiry</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom" style="margin-top: 0; padding-top: 1rem;">
            <p>Copyright &copy; 2026 Gurukul Classes | All Rights Reserved</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
