<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Gurukul Classes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #1abc9c;
    }

    label {
      font-size: 16px;
      margin-bottom: 10px;
      display: block;
      color: #333;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background-color: #1abc9c;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #16a085;
    }

    .back-link {
      margin-top: 20px;
    }

    .back-link a {
      color: #1abc9c;
      text-decoration: none;
      font-size: 16px;
    }

    .back-link a:hover {
      color: #16a085;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Forgot Password</h2>
    <form action="/reset-password" method="POST">
      <label for="email">Enter your registered email:</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
      <button type="submit">Send Reset Link</button>
    </form>
    <div class="back-link">
      <a href="/Student_Login.html">Back to Login</a>
    </div>
  </div>

  <script>
    // You can add any required validation or functionality here
    // For now, no JavaScript functionality is required, 
    // but you can add form validation or other interactivity as needed.
  </script>
</body>

</html>
